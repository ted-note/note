<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="내 노트">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="./manifest.json">
<title>내 노트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f7f6f3;
  --sidebar-bg: #1e1e2e;
  --sidebar-text: #cdd6f4;
  --sidebar-muted: #6c7086;
  --sidebar-hover: #313244;
  --sidebar-active: #45475a;
  --accent: #89b4fa;
  --panel-bg: #ffffff;
  --border: #e8e4dc;
  --text: #2d2d2d;
  --muted: #9a9590;
  --note-hover: #f0ede8;
  --danger: #f38ba8;
}

* { box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.app { display: flex; height: 100%; overflow: hidden; position: relative; }

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 50;
}
.sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid #313244; }
.app-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}
.search-box {
  display: flex;
  align-items: center;
  background: #313244;
  border-radius: 8px;
  padding: 7px 10px;
  gap: 7px;
}
.search-box input {
  background: none; border: none; outline: none;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; color: var(--sidebar-text); width: 100%;
}
.search-box input::placeholder { color: var(--sidebar-muted); }
.search-icon { font-size: 13px; color: var(--sidebar-muted); }
.sidebar-section-label {
  padding: 14px 16px 6px;
  font-size: 10px; letter-spacing: 0.15em;
  color: var(--sidebar-muted); text-transform: uppercase;
}
.notebook-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }
.notebook-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px; cursor: pointer;
  transition: background 0.15s;
  color: var(--sidebar-text); font-size: 14px; gap: 8px;
}
.notebook-item:hover { background: var(--sidebar-hover); }
.notebook-item.active { background: var(--sidebar-active); color: #fff; }
.notebook-item-left { display: flex; align-items: center; gap: 8px; overflow: hidden; }
.notebook-icon { font-size: 14px; flex-shrink: 0; }
.notebook-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notebook-count {
  font-size: 11px; color: var(--sidebar-muted);
  background: #313244; padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
}
.notebook-item.active .notebook-count { background: #45475a; color: #bac2de; }
.add-notebook-btn {
  margin: 8px 12px;
  padding: 9px 12px;
  background: none; border: 1px dashed #45475a; border-radius: 8px;
  color: var(--sidebar-muted);
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
  cursor: pointer; width: calc(100% - 24px); text-align: left;
  transition: border-color 0.2s, color 0.2s;
}
.add-notebook-btn:hover { border-color: var(--accent); color: var(--accent); }

/* NOTE LIST */
.note-list-panel {
  width: 240px; background: var(--panel-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.note-list-header {
  padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.current-notebook-name {
  font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 600;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.new-note-btn {
  background: var(--accent); color: #1e1e2e;
  border: none; border-radius: 7px; padding: 6px 10px;
  font-size: 18px; line-height: 1; cursor: pointer; font-weight: 700;
  flex-shrink: 0; margin-left: 8px;
  transition: opacity 0.2s, transform 0.1s;
}
.new-note-btn:active { transform: scale(0.93); opacity: 0.8; }
.note-list { flex: 1; overflow-y: auto; }
.note-item {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s; position: relative;
}
.note-item:hover { background: var(--note-hover); }
.note-item.active { background: #eef2ff; border-left: 3px solid var(--accent); padding-left: 13px; }
.note-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.note-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
.note-date { font-size: 11px; color: var(--muted); margin-top: 5px; }
.note-item-delete {
  position: absolute; top: 50%; right: 10px; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); font-size: 16px;
  cursor: pointer; opacity: 0; padding: 4px; transition: opacity 0.15s;
}
.note-item:hover .note-item-delete { opacity: 0.5; }
.note-item-delete:hover { opacity: 1 !important; color: var(--danger); }
.empty-notes { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 13px; line-height: 2; }
.search-result-label {
  padding: 10px 16px 6px; font-size: 11px; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border);
}

/* EDITOR */
.editor-panel {
  flex: 1; background: #fff;
  display: flex; flex-direction: column; overflow: hidden;
}
.editor-toolbar {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.editor-notebook-badge {
  font-size: 12px; color: var(--muted);
  background: var(--bg); padding: 3px 10px;
  border-radius: 20px; border: 1px solid var(--border);
}
.editor-save-status { margin-left: auto; font-size: 12px; color: var(--muted); }
.editor-delete-btn {
  background: none; border: none; color: var(--muted);
  font-size: 18px; cursor: pointer; padding: 4px 6px;
  border-radius: 6px; transition: background 0.15s, color 0.15s;
}
.editor-delete-btn:hover { background: #fff0f0; color: var(--danger); }
.editor-title-input {
  padding: 20px 24px 8px;
  font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 600;
  color: var(--text); border: none; outline: none; width: 100%; background: none; flex-shrink: 0;
}
.editor-title-input::placeholder { color: #ccc; }
.editor-meta { padding: 0 24px 12px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.editor-body {
  flex: 1; padding: 16px 24px 24px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 15px; line-height: 1.9;
  color: var(--text); border: none; outline: none; resize: none; background: none; width: 100%; overflow-y: auto;
}
.editor-body::placeholder { color: #ccc; font-style: italic; }
.no-note-placeholder {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; color: var(--muted); gap: 12px;
}
.no-note-placeholder .icon { font-size: 48px; opacity: 0.3; }
.no-note-placeholder p { font-size: 14px; }

/* 모바일 */
@media (max-width: 700px) {
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 20px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .note-list-panel {
    width: 100%; position: absolute; left: 0; top: 0; right: 0; bottom: 0;
    z-index: 10; transition: transform 0.3s ease;
  }
  .note-list-panel.hidden { transform: translateX(-100%); }
  .editor-panel {
    position: absolute; left: 0; top: 0; right: 0; bottom: 0;
    z-index: 20; transform: translateX(100%); transition: transform 0.3s ease;
  }
  .editor-panel.open { transform: translateX(0); }
  .mobile-top-bar { display: flex !important; }
  .note-list-header { display: none; }
  .editor-toolbar { display: none; }
}
.mobile-top-bar {
  display: none;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px; flex-shrink: 0;
  background: #fff;
}
.mobile-back-btn, .mobile-menu-btn {
  background: none; border: none; font-size: 20px;
  cursor: pointer; color: var(--text); padding: 4px;
}
.mobile-panel-title { font-size: 16px; font-weight: 500; flex: 1; }

/* 모달 */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 14px; padding: 24px;
  width: 100%; max-width: 320px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.modal h3 { font-family: 'Noto Serif KR', serif; font-size: 17px; margin-bottom: 16px; }
.modal input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px;
  outline: none; margin-bottom: 14px; transition: border-color 0.2s;
}
.modal input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  padding: 9px 18px; border-radius: 8px; border: none;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; cursor: pointer;
}
.modal-btn.cancel { background: var(--bg); color: var(--muted); }
.modal-btn.confirm { background: var(--accent); color: #1e1e2e; font-weight: 500; }

/* 토스트 */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30,30,46,0.92); color: #cdd6f4;
  padding: 10px 20px; border-radius: 20px; font-size: 13px;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 49; background: rgba(0,0,0,0.3);
}
.sidebar-overlay.open { display: block; }
  .nb-actions { display: none; gap: 2px; }
.notebook-item:hover .nb-actions { display: flex; }
.nb-actions button {
  background: none; border: none; cursor: pointer;
  font-size: 12px; padding: 2px 4px; border-radius: 4px;
  opacity: 0.6; transition: opacity 0.15s;
}
.nb-actions button:hover { opacity: 1; background: rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- 사이드바 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="app-title">📒 내 노트</div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="노트 검색..." oninput="handleSearch(this.value)">
      </div>
    </div>
    <div class="sidebar-section-label">노트북</div>
    <div class="notebook-list" id="notebook-list"></div>
    <button class="add-notebook-btn" onclick="openAddNotebook()">＋ 새 노트북</button>
  </div>

  <!-- 노트 목록 -->
  <div class="note-list-panel" id="note-list-panel">
    <div class="mobile-top-bar">
      <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
      <span class="mobile-panel-title" id="mobile-nb-title">노트북</span>
      <button class="new-note-btn" onclick="createNote()">＋</button>
    </div>
    <div class="note-list-header">
      <span class="current-notebook-name" id="current-nb-name">노트북 선택</span>
      <button class="new-note-btn" onclick="createNote()">＋</button>
    </div>
    <div class="note-list" id="note-list"></div>
  </div>

  <!-- 에디터 -->
  <div class="editor-panel" id="editor-panel">
    <div class="mobile-top-bar">
      <button class="mobile-back-btn" onclick="closeEditor()">←</button>
      <span class="mobile-panel-title" id="mobile-editor-title">노트</span>
      <button class="editor-delete-btn" onclick="deleteCurrentNote()">🗑</button>
    </div>
    <div class="editor-toolbar">
      <span class="editor-notebook-badge" id="editor-nb-badge">—</span>
      <span class="editor-save-status" id="save-status">저장됨</span>
      <button class="editor-delete-btn" onclick="deleteCurrentNote()">🗑</button>
    </div>

    <div id="editor-inner" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <input class="editor-title-input" id="editor-title" type="text" placeholder="제목" oninput="onEdit()">
      <div class="editor-meta" id="editor-meta"></div>
      <textarea class="editor-body" id="editor-body" placeholder="내용을 자유롭게 입력하세요..." oninput="onEdit()"></textarea>
    </div>

    <div class="no-note-placeholder" id="no-note-msg">
      <div class="icon">📝</div>
      <p>노트를 선택하거나 새로 만들어보세요</p>
    </div>
  </div>
</div>

<!-- 노트북 추가 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>새 노트북</h3>
    <input type="text" id="nb-name-input" placeholder="노트북 이름" maxlength="30"
      onkeydown="if(event.key==='Enter') confirmAddNb()">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="confirmAddNb()">만들기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ── 데이터 ──
let notebooks = JSON.parse(localStorage.getItem('nb_books') || '[]');
let notes = JSON.parse(localStorage.getItem('nb_notes') || '[]');
let curNbId = null, curNoteId = null, saveTimer = null;

function saveNbs() { localStorage.setItem('nb_books', JSON.stringify(notebooks)); }
function saveNts() { localStorage.setItem('nb_notes', JSON.stringify(notes)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// 기본 노트북
if (notebooks.length === 0) {
  notebooks = [
    { id: uid(), name: '일상', icon: '📔' },
    { id: uid(), name: '책 구절', icon: '📚' },
  ];
  saveNbs();
}

// ── 렌더 ──
function renderNbs() {
  document.getElementById('notebook-list').innerHTML = notebooks.map(nb => {
    const cnt = notes.filter(n => n.nbId === nb.id).length;
    return `<div class="notebook-item ${nb.id===curNbId?'active':''}" onclick="selectNb('${nb.id}')">
      <div class="notebook-item-left">
        <span class="notebook-icon">${nb.icon}</span>
        <span class="notebook-name">${esc(nb.name)}</span>
      </div>
      <span class="notebook-count">${cnt}</span>
      <div class="nb-actions">
  <button onclick="event.stopPropagation();renameNb('${nb.id}')" title="이름 변경">✏️</button>
  <button onclick="event.stopPropagation();deleteNb('${nb.id}')" title="삭제">🗑</button>
</div>
    </div>`;
  }).join('');
}

function renderNoteList(list, isSearch) {
  const nb = notebooks.find(n => n.id === curNbId);
  const nbName = nb ? nb.name : '노트북 선택';
  document.getElementById('current-nb-name').textContent = nbName;
  document.getElementById('mobile-nb-title').textContent = nbName;

  const container = document.getElementById('note-list');
  const items = list || (nb ? notes.filter(n => n.nbId === curNbId).sort((a,b) => b.updAt - a.updAt) : []);

  if (!nb && !isSearch) {
    container.innerHTML = `<div class="empty-notes">왼쪽에서<br>노트북을 선택하세요</div>`;
    return;
  }
  if (isSearch) {
    const label = `<div class="search-result-label">검색 결과 ${items.length}건</div>`;
    container.innerHTML = label + (items.length ? items.map(noteHTML).join('') : '<div class="empty-notes">결과 없음</div>');
    return;
  }
  container.innerHTML = items.length
    ? items.map(noteHTML).join('')
    : `<div class="empty-notes">노트가 없어요<br>＋ 버튼으로 만들어보세요</div>`;
}

function noteHTML(n) {
  const preview = n.body.replace(/\n/g,' ').slice(0,50);
  return `<div class="note-item ${n.id===curNoteId?'active':''}" onclick="selectNote('${n.id}')">
    <div class="note-title">${esc(n.title||'제목 없음')}</div>
    <div class="note-preview">${esc(preview)||'내용 없음'}</div>
    <div class="note-date">${relTime(n.updAt)}</div>
    <button class="note-item-delete" onclick="event.stopPropagation();deleteNote('${n.id}')">×</button>
  </div>`;
}

function renderEditor() {
  const note = notes.find(n => n.id === curNoteId);
  document.getElementById('editor-inner').style.display = note ? 'flex' : 'none';
  document.getElementById('no-note-msg').style.display = note ? 'none' : 'flex';
  if (!note) return;
  const nb = notebooks.find(b => b.id === note.nbId);
  document.getElementById('editor-nb-badge').textContent = nb ? `${nb.icon} ${nb.name}` : '';
  document.getElementById('mobile-editor-title').textContent = note.title || '제목 없음';
  document.getElementById('editor-title').value = note.title;
  document.getElementById('editor-body').value = note.body;
  document.getElementById('editor-meta').textContent = `${fullDate(note.updAt)} 수정`;
  document.getElementById('save-status').textContent = '저장됨';
}

// ── 노트북 조작 ──
function selectNb(id) {
  curNbId = id; curNoteId = null;
  document.getElementById('search-input').value = '';
  renderNbs(); renderNoteList(); renderEditor();
  closeSidebar();
  document.getElementById('editor-panel').classList.remove('open');
}

function openAddNotebook() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('nb-name-input').value = '';
  setTimeout(() => document.getElementById('nb-name-input').focus(), 100);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function confirmAddNb() {
  const name = document.getElementById('nb-name-input').value.trim();
  if (!name) return;
  const icons = ['📔','📓','📒','📕','📗','📘','🗒️','📋'];
  const nb = { id: uid(), name, icon: icons[notebooks.length % icons.length] };
  notebooks.push(nb); saveNbs();
  closeModal(); selectNb(nb.id);
  showToast(`"${name}" 노트북 만들어졌어요`);
}

// ── 노트 조작 ──
function createNote() {
  if (!curNbId) { showToast('노트북을 먼저 선택하세요'); return; }
  const note = { id: uid(), nbId: curNbId, title: '', body: '', crtAt: Date.now(), updAt: Date.now() };
  notes.unshift(note); saveNts();
  curNoteId = note.id;
  renderNoteList(); renderEditor(); renderNbs();
  openEditorMobile();
  setTimeout(() => document.getElementById('editor-title').focus(), 150);
}

function selectNote(id) {
  flushSave();
  curNoteId = id;
  renderNoteList(); renderEditor();
  openEditorMobile();
}

function deleteNote(id) {
  notes = notes.filter(n => n.id !== id); saveNts();
  if (curNoteId === id) { curNoteId = null; renderEditor(); document.getElementById('editor-panel').classList.remove('open'); }
  renderNoteList(); renderNbs();
  showToast('노트 삭제됐어요');
}

function deleteCurrentNote() { if (curNoteId) deleteNote(curNoteId); }

// ── 에디터 ──
function onEdit() {
  document.getElementById('save-status').textContent = '저장 중...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 800);
}

function flushSave() {
  if (!curNoteId) return;
  const title = document.getElementById('editor-title').value;
  const body = document.getElementById('editor-body').value;
  const idx = notes.findIndex(n => n.id === curNoteId);
  if (idx === -1) return;
  notes[idx].title = title; notes[idx].body = body; notes[idx].updAt = Date.now();
  saveNts();
  document.getElementById('save-status').textContent = '저장됨';
  document.getElementById('editor-meta').textContent = `${fullDate(notes[idx].updAt)} 수정`;
  document.getElementById('mobile-editor-title').textContent = title || '제목 없음';
  renderNoteList(); renderNbs();
}

// ── 검색 ──
function handleSearch(q) {
  q = q.trim();
  if (!q) { renderNoteList(); return; }
  const lower = q.toLowerCase();
  const results = notes.filter(n =>
    n.title.toLowerCase().includes(lower) || n.body.toLowerCase().includes(lower)
  ).sort((a,b) => b.updAt - a.updAt);
  renderNoteList(results, true);
}

// ── 모바일 ──
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
function openEditorMobile() {
  if (window.innerWidth <= 700) document.getElementById('editor-panel').classList.add('open');
}
function closeEditor() { document.getElementById('editor-panel').classList.remove('open'); }

// ── 유틸 ──
function relTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return '방금';
  if (d < 3600000) return Math.floor(d/60000) + '분 전';
  if (d < 86400000) return Math.floor(d/3600000) + '시간 전';
  const dt = new Date(ts);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function fullDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

window.addEventListener('beforeunload', flushSave);

// 초기 실행
selectNb(notebooks[0].id);
  function renameNb(id) {
  const nb = notebooks.find(n => n.id === id);
  const newName = prompt('새 이름을 입력하세요', nb.name);
  if (!newName || !newName.trim()) return;
  nb.name = newName.trim();
  saveNbs();
  renderNbs();
  if (curNbId === id) {
    document.getElementById('current-nb-name').textContent = nb.name;
    document.getElementById('mobile-nb-title').textContent = nb.name;
  }
  showToast('이름이 바뀌었어요');
}

function deleteNb(id) {
  const nb = notebooks.find(n => n.id === id);
  const cnt = notes.filter(n => n.nbId === id).length;
  const msg = cnt > 0
    ? `"${nb.name}" 안에 노트 ${cnt}개가 있어요.\n정말 삭제할까요?`
    : `"${nb.name}"을 삭제할까요?`;
  if (!confirm(msg)) return;
  notebooks = notebooks.filter(n => n.id !== id);
  notes = notes.filter(n => n.nbId !== id);
  saveNbs(); saveNts();
  if (curNbId === id) {
    curNbId = notebooks.length ? notebooks[0].id : null;
    curNoteId = null;
  }
  renderNbs(); renderNoteList(); renderEditor();
  showToast('노트북이 삭제됐어요');
}
