<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="내 노트">
<meta name="theme-color" content="#1e1e2e">
<link rel="manifest" href="./manifest.json">
<title>내 노트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f7f6f3;
  --sidebar-bg: #1e1e2e;
  --sidebar-text: #cdd6f4;
  --sidebar-muted: #6c7086;
  --sidebar-hover: #313244;
  --sidebar-active: #45475a;
  --accent: #89b4fa;
  --panel-bg: #ffffff;
  --border: #e8e4dc;
  --text: #2d2d2d;
  --muted: #9a9590;
  --note-hover: #f0ede8;
  --danger: #f38ba8;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh; height: 100dvh;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.app { display: flex; height: 100%; overflow: hidden; position: relative; }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; background: var(--sidebar-bg);
  display: flex; flex-direction: column; flex-shrink: 0; z-index: 50;
}
.sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid #313244; }
.app-title {
  font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 600;
  color: var(--accent); letter-spacing: 0.05em; margin-bottom: 14px;
}
.search-box {
  display: flex; align-items: center;
  background: #313244; border-radius: 8px; padding: 7px 10px; gap: 7px;
}
.search-box input {
  background: none; border: none; outline: none;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--sidebar-text); width: 100%;
}
.search-box input::placeholder { color: var(--sidebar-muted); }
.sidebar-section-label {
  padding: 14px 16px 6px; font-size: 10px; letter-spacing: 0.15em;
  color: var(--sidebar-muted); text-transform: uppercase;
}
.notebook-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }
.notebook-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px; cursor: pointer; transition: background 0.15s;
  color: var(--sidebar-text); font-size: 14px; gap: 8px;
}
.notebook-item:hover { background: var(--sidebar-hover); }
.notebook-item.active { background: var(--sidebar-active); color: #fff; }
.notebook-item-left { display: flex; align-items: center; gap: 8px; overflow: hidden; flex: 1; }
.notebook-icon { font-size: 14px; flex-shrink: 0; }
.notebook-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notebook-count {
  font-size: 11px; color: var(--sidebar-muted);
  background: #313244; padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
}
.notebook-item.active .notebook-count { background: #45475a; color: #bac2de; }
.nb-actions { display: none; gap: 2px; flex-shrink: 0; }
.notebook-item:hover .nb-actions { display: flex; }
.nb-actions button {
  background: none; border: none; cursor: pointer;
  font-size: 13px; padding: 3px 5px; border-radius: 4px;
  opacity: 0.5; transition: opacity 0.15s, background 0.15s; line-height: 1;
}
.nb-actions button:hover { opacity: 1; background: rgba(255,255,255,0.12); }
.add-notebook-btn {
  margin: 8px 12px; padding: 9px 12px;
  background: none; border: 1px dashed #45475a; border-radius: 8px;
  color: var(--sidebar-muted); font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
  cursor: pointer; width: calc(100% - 24px); text-align: left;
  transition: border-color 0.2s, color 0.2s;
}
.add-notebook-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── NOTE LIST ── */
.note-list-panel {
  width: 240px; background: var(--panel-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.note-list-header {
  padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.current-notebook-name {
  font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 600;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.new-note-btn {
  background: var(--accent); color: #1e1e2e; border: none; border-radius: 7px;
  padding: 6px 10px; font-size: 18px; line-height: 1; cursor: pointer; font-weight: 700;
  flex-shrink: 0; margin-left: 8px; transition: opacity 0.2s, transform 0.1s;
}
.new-note-btn:active { transform: scale(0.93); opacity: 0.8; }
.note-list { flex: 1; overflow-y: auto; }
.note-item {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s; position: relative;
}
.note-item:hover { background: var(--note-hover); }
.note-item.active { background: #eef2ff; border-left: 3px solid var(--accent); padding-left: 13px; }
.note-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.note-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
.note-date { font-size: 11px; color: var(--muted); margin-top: 5px; }
.note-item-delete {
  position: absolute; top: 50%; right: 10px; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); font-size: 16px;
  cursor: pointer; opacity: 0; padding: 4px; transition: opacity 0.15s;
}
.note-item:hover .note-item-delete { opacity: 0.5; }
.note-item-delete:hover { opacity: 1 !important; color: var(--danger); }
.empty-notes { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 13px; line-height: 2; }
.search-result-label {
  padding: 10px 16px 6px; font-size: 11px; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border);
}

/* ── EDITOR ── */
.editor-panel {
  flex: 1; background: #fff; display: flex; flex-direction: column; overflow: hidden;
}
.editor-toolbar {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap;
}
.editor-notebook-badge {
  font-size: 12px; color: var(--muted); background: var(--bg);
  padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border);
}
.editor-save-status { font-size: 12px; color: var(--muted); margin-left: auto; }
.editor-delete-btn {
  background: none; border: none; color: var(--muted); font-size: 18px;
  cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: background 0.15s, color 0.15s;
}
.editor-delete-btn:hover { background: #fff0f0; color: var(--danger); }

/* 서식 툴바 */
.format-toolbar {
  padding: 6px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 4px; flex-shrink: 0; flex-wrap: wrap;
}
.fmt-btn {
  background: none; border: 1px solid transparent; border-radius: 6px;
  padding: 5px 8px; font-size: 13px; cursor: pointer; color: var(--muted);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  line-height: 1; white-space: nowrap;
}
.fmt-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border); }
.fmt-btn.active { background: #eef2ff; color: #4361ee; border-color: #c7d2fe; }
.fmt-sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

.editor-title-input {
  padding: 16px 24px 8px;
  font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 600;
  color: var(--text); border: none; outline: none; width: 100%; background: none; flex-shrink: 0;
}
.editor-title-input::placeholder { color: #ccc; }
.editor-meta { padding: 0 24px 10px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0; }

/* contenteditable 에디터 */
.editor-body {
  flex: 1; padding: 16px 24px 80px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 15px; line-height: 1.9;
  color: var(--text); outline: none; overflow-y: auto; width: 100%;
}
.editor-body:empty::before { content: attr(data-placeholder); color: #ccc; font-style: italic; pointer-events: none; }

/* 에디터 내 요소 스타일 */
.editor-body a { color: #4361ee; text-decoration: underline; word-break: break-all; }
.editor-body img {
  max-width: 100%; border-radius: 8px; margin: 8px 0;
  display: block; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.editor-body .link-card {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; margin: 8px 0; text-decoration: none; color: var(--text);
  font-size: 14px; word-break: break-all;
}
.editor-body .link-card .link-icon { font-size: 18px; flex-shrink: 0; }
.editor-body .link-card .link-url { color: var(--muted); font-size: 12px; margin-top: 2px; }
.editor-body blockquote {
  border-left: 3px solid var(--accent); padding-left: 16px;
  margin: 8px 0; color: var(--muted); font-style: italic;
}
.editor-body h2 { font-family: 'Noto Serif KR', serif; font-size: 18px; margin: 12px 0 4px; }
.editor-body h3 { font-family: 'Noto Serif KR', serif; font-size: 16px; margin: 10px 0 4px; }
.editor-body ul, .editor-body ol { padding-left: 20px; margin: 4px 0; }
.editor-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

.no-note-placeholder {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; color: var(--muted); gap: 12px;
}
.no-note-placeholder .icon { font-size: 48px; opacity: 0.3; }
.no-note-placeholder p { font-size: 14px; }

/* 이미지 숨긴 input */
#img-upload { display: none; }

/* ── 모바일 ── */
@media (max-width: 700px) {
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    transform: translateX(-100%); box-shadow: 4px 0 20px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .note-list-panel {
    width: 100%; position: absolute; left: 0; top: 0; right: 0; bottom: 0;
    z-index: 10; transition: transform 0.3s ease;
  }
  .editor-panel {
    position: absolute; left: 0; top: 0; right: 0; bottom: 0;
    z-index: 20; transform: translateX(100%); transition: transform 0.3s ease;
  }
  .editor-panel.open { transform: translateX(0); }
  .mobile-top-bar { display: flex !important; }
  .note-list-header { display: none; }
  .editor-toolbar { display: none; }
  .nb-actions { display: flex !important; }
  .nb-actions button { opacity: 0.6; }
  .format-toolbar { gap: 2px; padding: 6px 10px; }
  .fmt-btn { padding: 5px 6px; font-size: 12px; }
}
.mobile-top-bar {
  display: none; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; background: #fff;
}
.mobile-back-btn, .mobile-menu-btn {
  background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text); padding: 4px;
}
.mobile-panel-title { font-size: 16px; font-weight: 500; flex: 1; }

/* ── 모달 ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 14px; padding: 24px;
  width: 100%; max-width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.modal h3 { font-family: 'Noto Serif KR', serif; font-size: 17px; margin-bottom: 16px; }
.modal input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px;
  outline: none; margin-bottom: 14px; transition: border-color 0.2s;
}
.modal input:focus { border-color: var(--accent); }
.modal p { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 18px; }

/* 아이콘 선택 */
.icon-picker-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: block; }
.icon-picker {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: 4px; margin-bottom: 14px;
  max-height: 130px; overflow-y: auto;
  border: 1.5px solid var(--border); border-radius: 8px; padding: 8px;
}
.icon-option {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 20px; border-radius: 6px; cursor: pointer; border: 2px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}
.icon-option:hover { background: var(--bg); }
.icon-option.selected { border-color: var(--accent); background: #eef2ff; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  padding: 9px 18px; border-radius: 8px; border: none;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; cursor: pointer;
}
.modal-btn.cancel { background: var(--bg); color: var(--muted); }
.modal-btn.confirm { background: var(--accent); color: #1e1e2e; font-weight: 500; }
.modal-btn.danger { background: var(--danger); color: #fff; font-weight: 500; }

/* 토스트 */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30,30,46,0.92); color: #cdd6f4;
  padding: 10px 20px; border-radius: 20px; font-size: 13px;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 49; background: rgba(0,0,0,0.3);
}
.sidebar-overlay.open { display: block; }
</style>
</head>
<body>
<input type="file" id="img-upload" accept="image/*" multiple onchange="handleImgUpload(this)">

<div class="app">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- 사이드바 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="app-title">📒 내 노트</div>
      <div class="search-box">
        <span style="font-size:13px;color:var(--sidebar-muted)">🔍</span>
        <input type="text" id="search-input" placeholder="노트 검색..." oninput="handleSearch(this.value)">
      </div>
    </div>
    <div class="sidebar-section-label">노트북</div>
    <div class="notebook-list" id="notebook-list"></div>
    <button class="add-notebook-btn" onclick="openModal('modal-add')">＋ 새 노트북</button>
  </div>

  <!-- 노트 목록 -->
  <div class="note-list-panel" id="note-list-panel">
    <div class="mobile-top-bar">
      <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
      <span class="mobile-panel-title" id="mobile-nb-title">노트북</span>
      <button class="new-note-btn" onclick="createNote()">＋</button>
    </div>
    <div class="note-list-header">
      <span class="current-notebook-name" id="current-nb-name">노트북 선택</span>
      <button class="new-note-btn" onclick="createNote()">＋</button>
    </div>
    <div class="note-list" id="note-list"></div>
  </div>

  <!-- 에디터 -->
  <div class="editor-panel" id="editor-panel">
    <div class="mobile-top-bar">
      <button class="mobile-back-btn" onclick="closeEditor()">←</button>
      <span class="mobile-panel-title" id="mobile-editor-title">노트</span>
      <button class="editor-delete-btn" onclick="deleteCurrentNote()">🗑</button>
    </div>
    <div class="editor-toolbar">
      <span class="editor-notebook-badge" id="editor-nb-badge">—</span>
      <span class="editor-save-status" id="save-status">저장됨</span>
      <button class="editor-delete-btn" onclick="deleteCurrentNote()">🗑</button>
    </div>

    <div id="editor-inner" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <input class="editor-title-input" id="editor-title" type="text" placeholder="제목" oninput="onEdit()">
      <div class="editor-meta" id="editor-meta"></div>

      <!-- 서식 툴바 -->
      <div class="format-toolbar">
        <button class="fmt-btn" onclick="fmt('bold')" title="굵게"><b>B</b></button>
        <button class="fmt-btn" onclick="fmt('italic')" title="기울임"><i>I</i></button>
        <button class="fmt-btn" onclick="fmt('underline')" title="밑줄"><u>U</u></button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" onclick="fmtBlock('h2')" title="제목">H</button>
        <button class="fmt-btn" onclick="fmt('insertUnorderedList')" title="목록">• 목록</button>
        <button class="fmt-btn" onclick="fmtBlock('blockquote')" title="인용">❝</button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" onclick="document.getElementById('img-upload').click()" title="이미지">🖼 이미지</button>
        <button class="fmt-btn" onclick="openLinkModal()" title="링크">🔗 링크</button>
        <div class="fmt-sep"></div>
        <button class="fmt-btn" onclick="fmt('insertHorizontalRule')" title="구분선">—</button>
      </div>

      <div class="editor-body" id="editor-body"
           contenteditable="true"
           data-placeholder="내용을 자유롭게 입력하세요..."
           oninput="onEdit()"
           onpaste="handlePaste(event)"></div>
    </div>

    <div class="no-note-placeholder" id="no-note-msg">
      <div class="icon">📝</div>
      <p>노트를 선택하거나 새로 만들어보세요</p>
    </div>
  </div>
</div>

<!-- 노트북 추가 모달 -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h3>새 노트북</h3>
    <input type="text" id="nb-add-input" placeholder="노트북 이름" maxlength="30"
      onkeydown="if(event.key==='Enter') confirmAddNb()">
    <span class="icon-picker-label">아이콘 선택</span>
    <div class="icon-picker" id="icon-picker-add"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('modal-add')">취소</button>
      <button class="modal-btn confirm" onclick="confirmAddNb()">만들기</button>
    </div>
  </div>
</div>

<!-- 노트북 이름 변경 모달 -->
<div class="modal-overlay" id="modal-rename">
  <div class="modal">
    <h3>이름 변경</h3>
    <input type="text" id="nb-rename-input" placeholder="새 이름" maxlength="30"
      onkeydown="if(event.key==='Enter') confirmRenameNb()">
    <span class="icon-picker-label">아이콘 선택</span>
    <div class="icon-picker" id="icon-picker-rename"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('modal-rename')">취소</button>
      <button class="modal-btn confirm" onclick="confirmRenameNb()">변경</button>
    </div>
  </div>
</div>

<!-- 노트북 삭제 확인 모달 -->
<div class="modal-overlay" id="modal-delete-nb">
  <div class="modal">
    <h3>노트북 삭제</h3>
    <p id="modal-delete-msg"></p>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('modal-delete-nb')">취소</button>
      <button class="modal-btn danger" onclick="confirmDeleteNb()">삭제</button>
    </div>
  </div>
</div>

<!-- 링크 추가 모달 -->
<div class="modal-overlay" id="modal-link">
  <div class="modal">
    <h3>🔗 링크 추가</h3>
    <input type="url" id="link-url-input" placeholder="https://..." 
      onkeydown="if(event.key==='Enter') confirmAddLink()">
    <input type="text" id="link-text-input" placeholder="표시할 텍스트 (선택)"
      onkeydown="if(event.key==='Enter') confirmAddLink()">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal('modal-link')">취소</button>
      <button class="modal-btn confirm" onclick="confirmAddLink()">추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ── Firebase 초기화 ──

const firebaseConfig = {
  apiKey: "AIzaSyAN0ycUk3qSOYuJhObjx0in8AydNRP9RHU",
  authDomain: "ted-note.firebaseapp.com",
  projectId: "ted-note",
  storageBucket: "ted-note.firebasestorage.app",
  messagingSenderId: "423297333803",
  appId: "1:423297333803:web:a7dfecbe51d28ea0b1086e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── 데이터 ──
let notebooks = [];
let notes = [];
let curNbId = null, curNoteId = null, saveTimer = null;
let pendingRenameId = null, pendingDeleteId = null;
let savedRange = null;
let dbReady = false;

// ── 아이콘 목록 ──
const ICONS = [
  '📔','📓','📒','📕','📗','📘','📙','🗒️',
  '📋','📁','📂','🗂️','📝','✏️','🖊️','🖋️',
  '📌','📍','🔖','🏷️','💡','🔍','⭐','🌟',
  '❤️','💛','💚','💙','💜','🖤','🤍','🎯',
  '🎨','🎵','🎬','📷','🌙','☀️','🌈','🌊',
  '🏠','🌿','🍀','🌸','🦋','🐾','🚀','💎',
];
let selectedIconAdd = ICONS[0];
let selectedIconRename = ICONS[0];

function renderIconPicker(containerId, selectedIcon, onSelect) {
  const container = document.getElementById(containerId);
  container.innerHTML = ICONS.map(icon =>
    `<div class="icon-option ${icon === selectedIcon ? 'selected' : ''}"
      onclick="(${onSelect.toString()})('${icon}')">${icon}</div>`
  ).join('');
}

// ── Firebase 저장 ──
async function saveNb(nb) {
  await setDoc(doc(db, 'notebooks', nb.id), nb);
}
async function saveNt(note) {
  // body가 너무 크면 Firestore 4MB 제한 때문에 이미지 제외 저장
  await setDoc(doc(db, 'notes', note.id), note);
}
async function deleteNbFromDb(id) {
  await deleteDoc(doc(db, 'notebooks', id));
}
async function deleteNtFromDb(id) {
  await deleteDoc(doc(db, 'notes', id));
}
// 하위 호환용 (기존 코드에서 호출)
function saveNbs() { notebooks.forEach(nb => saveNb(nb)); }
function saveNts() { notes.forEach(n => saveNt(n)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }



// ── 렌더 ──
function renderNbs() {
  document.getElementById('notebook-list').innerHTML = notebooks.map(nb => {
    const cnt = notes.filter(n => n.nbId === nb.id).length;
    return `<div class="notebook-item ${nb.id===curNbId?'active':''}" onclick="selectNb('${nb.id}')">
      <div class="notebook-item-left">
        <span class="notebook-icon">${nb.icon}</span>
        <span class="notebook-name">${esc(nb.name)}</span>
      </div>
      <span class="notebook-count">${cnt}</span>
      <div class="nb-actions">
        <button onclick="event.stopPropagation();openRenameNb('${nb.id}')" title="이름 변경">✏️</button>
        <button onclick="event.stopPropagation();openDeleteNb('${nb.id}')" title="삭제">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function renderNoteList(list, isSearch) {
  const nb = notebooks.find(n => n.id === curNbId);
  const nbName = nb ? nb.name : '노트북 선택';
  document.getElementById('current-nb-name').textContent = nbName;
  document.getElementById('mobile-nb-title').textContent = nbName;
  const container = document.getElementById('note-list');
  const items = list || (nb ? notes.filter(n => n.nbId === curNbId).sort((a,b) => b.updAt - a.updAt) : []);
  if (!nb && !isSearch) {
    container.innerHTML = `<div class="empty-notes">왼쪽에서<br>노트북을 선택하세요</div>`;
    return;
  }
  if (isSearch) {
    const label = `<div class="search-result-label">검색 결과 ${items.length}건</div>`;
    container.innerHTML = label + (items.length ? items.map(noteHTML).join('') : '<div class="empty-notes">결과 없음</div>');
    return;
  }
  container.innerHTML = items.length
    ? items.map(noteHTML).join('')
    : `<div class="empty-notes">노트가 없어요<br>＋ 버튼으로 만들어보세요</div>`;
}

function noteHTML(n) {
  // HTML 태그 제거해서 미리보기
  const tmp = document.createElement('div');
  tmp.innerHTML = n.body || '';
  const preview = (tmp.textContent || '').replace(/\s+/g,' ').trim().slice(0,50);
  return `<div class="note-item ${n.id===curNoteId?'active':''}" onclick="selectNote('${n.id}')">
    <div class="note-title">${esc(n.title||'제목 없음')}</div>
    <div class="note-preview">${esc(preview)||'내용 없음'}</div>
    <div class="note-date">${relTime(n.updAt)}</div>
    <button class="note-item-delete" onclick="event.stopPropagation();deleteNote('${n.id}')">×</button>
  </div>`;
}

function renderEditor() {
  const note = notes.find(n => n.id === curNoteId);
  document.getElementById('editor-inner').style.display = note ? 'flex' : 'none';
  document.getElementById('no-note-msg').style.display = note ? 'none' : 'flex';
  if (!note) return;
  const nb = notebooks.find(b => b.id === note.nbId);
  document.getElementById('editor-nb-badge').textContent = nb ? `${nb.icon} ${nb.name}` : '';
  document.getElementById('mobile-editor-title').textContent = note.title || '제목 없음';
  document.getElementById('editor-title').value = note.title;
  document.getElementById('editor-body').innerHTML = note.body || '';
  document.getElementById('editor-meta').textContent = `${fullDate(note.updAt)} 수정`;
  document.getElementById('save-status').textContent = '저장됨';
}

// ── 노트북 ──
function selectNb(id) {
  curNbId = id; curNoteId = null;
  document.getElementById('search-input').value = '';
  renderNbs(); renderNoteList(); renderEditor();
  closeSidebar();
  document.getElementById('editor-panel').classList.remove('open');
}

function confirmAddNb() {
  const name = document.getElementById('nb-add-input').value.trim();
  if (!name) return;
  const nb = { id: uid(), name, icon: selectedIconAdd };
  notebooks.push(nb);
  saveNb(nb);
  closeModal('modal-add'); selectNb(nb.id);
  showToast(`"${name}" 노트북 만들어졌어요`);
}

function openRenameNb(id) {
  pendingRenameId = id;
  const nb = notebooks.find(n => n.id === id);
  document.getElementById('nb-rename-input').value = nb.name;
  selectedIconRename = nb.icon || ICONS[0];
  openModal('modal-rename');
  renderIconPickerRename();
  setTimeout(() => { const i = document.getElementById('nb-rename-input'); i.focus(); i.select(); }, 100);
}
function confirmRenameNb() {
  const name = document.getElementById('nb-rename-input').value.trim();
  if (!name || !pendingRenameId) return;
  const nb = notebooks.find(n => n.id === pendingRenameId);
  nb.name = name;
  nb.icon = selectedIconRename;
  saveNb(nb);
  closeModal('modal-rename');
  renderNbs(); renderNoteList(); renderEditor();
  showToast('이름이 바뀌었어요 ✏️');
  pendingRenameId = null;
}

function openDeleteNb(id) {
  pendingDeleteId = id;
  const nb = notebooks.find(n => n.id === id);
  const cnt = notes.filter(n => n.nbId === id).length;
  document.getElementById('modal-delete-msg').textContent =
    cnt > 0
      ? `"${nb.name}" 안에 노트 ${cnt}개가 있어요. 삭제하면 노트도 전부 사라져요. 정말 삭제할까요?`
      : `"${nb.name}" 노트북을 삭제할까요?`;
  openModal('modal-delete-nb');
}
function confirmDeleteNb() {
  if (!pendingDeleteId) return;
  const nb = notebooks.find(n => n.id === pendingDeleteId);
  const toDeleteNotes = notes.filter(n => n.nbId === pendingDeleteId);
  notebooks = notebooks.filter(n => n.id !== pendingDeleteId);
  notes = notes.filter(n => n.nbId !== pendingDeleteId);
  deleteNbFromDb(pendingDeleteId);
  toDeleteNotes.forEach(n => deleteNtFromDb(n.id));
  closeModal('modal-delete-nb');
  if (curNbId === pendingDeleteId) { curNbId = notebooks.length ? notebooks[0].id : null; curNoteId = null; }
  pendingDeleteId = null;
  renderNbs(); renderNoteList(); renderEditor();
  showToast(`"${nb.name}" 삭제됐어요`);
}

// ── 노트 ──
function createNote() {
  if (!curNbId) { showToast('노트북을 먼저 선택하세요'); return; }
  const note = { id: uid(), nbId: curNbId, title: '', body: '', crtAt: Date.now(), updAt: Date.now() };
  notes.unshift(note);
  saveNt(note);
  curNoteId = note.id;
  renderNoteList(); renderEditor(); renderNbs();
  openEditorMobile();
  setTimeout(() => document.getElementById('editor-title').focus(), 150);
}

function selectNote(id) {
  flushSave(); curNoteId = id;
  renderNoteList(); renderEditor(); openEditorMobile();
}

function deleteNote(id) {
  notes = notes.filter(n => n.id !== id);
  deleteNtFromDb(id);
  if (curNoteId === id) {
    curNoteId = null; renderEditor();
    document.getElementById('editor-panel').classList.remove('open');
  }
  renderNoteList(); renderNbs(); showToast('노트 삭제됐어요');
}
function deleteCurrentNote() { if (curNoteId) deleteNote(curNoteId); }

// ── 에디터 저장 ──
function onEdit() {
  document.getElementById('save-status').textContent = '저장 중...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 800);
}

function flushSave() {
  if (!curNoteId) return;
  const title = document.getElementById('editor-title').value;
  const body = document.getElementById('editor-body').innerHTML;
  const idx = notes.findIndex(n => n.id === curNoteId);
  if (idx === -1) return;
  notes[idx].title = title; notes[idx].body = body; notes[idx].updAt = Date.now();
  saveNt(notes[idx]);
  document.getElementById('save-status').textContent = '저장됨';
  document.getElementById('editor-meta').textContent = `${fullDate(notes[idx].updAt)} 수정`;
  document.getElementById('mobile-editor-title').textContent = title || '제목 없음';
  renderNoteList(); renderNbs();
}

// ── 서식 ──
function fmt(cmd) {
  document.getElementById('editor-body').focus();
  document.execCommand(cmd, false, null);
  onEdit();
}
function fmtBlock(tag) {
  document.getElementById('editor-body').focus();
  document.execCommand('formatBlock', false, tag);
  onEdit();
}

// ── 이미지 업로드 ──
function handleImgUpload(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = `<img src="${e.target.result}" alt="이미지">`;
      insertAtCursor(img);
      onEdit();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

// ── 링크 추가 ──
function openLinkModal() {
  // 커서 위치 저장
  const sel = window.getSelection();
  if (sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
  document.getElementById('link-url-input').value = '';
  document.getElementById('link-text-input').value = sel.toString() || '';
  openModal('modal-link');
  setTimeout(() => document.getElementById('link-url-input').focus(), 100);
}

function confirmAddLink() {
  let url = document.getElementById('link-url-input').value.trim();
  const text = document.getElementById('link-text-input').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  const label = text || url;
  const html = `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(label)}</a>`;
  closeModal('modal-link');
  // 저장된 커서 위치에 삽입
  const editor = document.getElementById('editor-body');
  editor.focus();
  if (savedRange) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
    savedRange = null;
  }
  document.execCommand('insertHTML', false, html);
  onEdit();
  showToast('링크가 추가됐어요 🔗');
}

// ── 붙여넣기 처리 (URL 자동 감지) ──
function handlePaste(e) {
  const text = e.clipboardData.getData('text/plain');
  const urlPattern = /^https?:\/\/[^\s]+$/;
  if (urlPattern.test(text.trim())) {
    e.preventDefault();
    const url = text.trim();
    const html = `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a>`;
    document.execCommand('insertHTML', false, html);
    onEdit();
  }
}

// ── 커서 위치에 HTML 삽입 ──
function insertAtCursor(html) {
  const editor = document.getElementById('editor-body');
  editor.focus();
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const el = document.createElement('div');
    el.innerHTML = html;
    const frag = document.createDocumentFragment();
    let node, lastNode;
    while ((node = el.firstChild)) { lastNode = frag.appendChild(node); }
    range.insertNode(frag);
    if (lastNode) {
      const r = range.cloneRange();
      r.setStartAfter(lastNode); r.collapse(true);
      sel.removeAllRanges(); sel.addRange(r);
    }
  } else {
    editor.innerHTML += html;
  }
}

// ── 검색 ──
function handleSearch(q) {
  q = q.trim();
  if (!q) { renderNoteList(); return; }
  const lower = q.toLowerCase();
  const results = notes.filter(n => {
    const tmp = document.createElement('div');
    tmp.innerHTML = n.body || '';
    const bodyText = tmp.textContent.toLowerCase();
    return n.title.toLowerCase().includes(lower) || bodyText.includes(lower);
  }).sort((a,b) => b.updAt - a.updAt);
  renderNoteList(results, true);
}

// ── 모달 ──
function renderIconPickerAdd() {
  renderIconPicker('icon-picker-add', selectedIconAdd, function(icon) {
    selectedIconAdd = icon;
    renderIconPickerAdd();
  });
}
function renderIconPickerRename() {
  renderIconPicker('icon-picker-rename', selectedIconRename, function(icon) {
    selectedIconRename = icon;
    renderIconPickerRename();
  });
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'modal-add') {
    document.getElementById('nb-add-input').value = '';
    selectedIconAdd = ICONS[0];
    renderIconPickerAdd();
    setTimeout(() => document.getElementById('nb-add-input').focus(), 100);
  }
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── 모바일 ──
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
function openEditorMobile() {
  if (window.innerWidth <= 700) document.getElementById('editor-panel').classList.add('open');
}
function closeEditor() { document.getElementById('editor-panel').classList.remove('open'); }

// ── 유틸 ──
function relTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return '방금';
  if (d < 3600000) return Math.floor(d/60000) + '분 전';
  if (d < 86400000) return Math.floor(d/3600000) + '시간 전';
  const dt = new Date(ts);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}
function fullDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

window.addEventListener('beforeunload', flushSave);

// ── Firebase 초기 데이터 로드 ──
async function initApp() {
  showToast('데이터 불러오는 중...');
  try {
    const [nbSnap, ntSnap] = await Promise.all([
      getDocs(collection(db, 'notebooks')),
      getDocs(collection(db, 'notes'))
    ]);
    notebooks = nbSnap.docs.map(d => d.data());
    notes = ntSnap.docs.map(d => d.data());
    // updAt 기준 정렬
    notes.sort((a, b) => (b.updAt || 0) - (a.updAt || 0));
  } catch(e) {
    console.error(e);
    showToast('데이터 로드 실패. 새로고침 해주세요.');
  }
  if (notebooks.length > 0) selectNb(notebooks[0].id);
  else { renderNbs(); renderNoteList(); renderEditor(); }
}
initApp();

// ── 전역 함수 노출 (onclick에서 호출 가능하도록) ──
window.selectNb = selectNb;
window.createNote = createNote;
window.selectNote = selectNote;
window.deleteNote = deleteNote;
window.deleteCurrentNote = deleteCurrentNote;
window.openModal = openModal;
window.closeModal = closeModal;
window.confirmAddNb = confirmAddNb;
window.openRenameNb = openRenameNb;
window.confirmRenameNb = confirmRenameNb;
window.openDeleteNb = openDeleteNb;
window.confirmDeleteNb = confirmDeleteNb;
window.openLinkModal = openLinkModal;
window.confirmAddLink = confirmAddLink;
window.handleSearch = handleSearch;
window.handleImgUpload = handleImgUpload;
window.handlePaste = handlePaste;
window.fmt = fmt;
window.fmtBlock = fmtBlock;
window.onEdit = onEdit;
window.openSidebar = openSidebar;
window.closeSidebar = closeSidebar;
window.closeEditor = closeEditor;
</script>
